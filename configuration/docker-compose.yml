services:
  db:
    image: mysql:8.0
    container_name: mysql
    environment:
      - MYSQL_DATABASE=IVP
      - MYSQL_USER=IVP
      - MYSQL_PASSWORD_FILE=/run/secrets/mysql_password
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
    networks:
      - v2xhub_internal
    secrets:
      - mysql_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "db", "-u", "IVP", "-p$$(cat /run/secrets/mysql_password)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./mysql/localhost.sql:/docker-entrypoint-initdb.d/localhost.sql
      - ./mysql/port_drayage.sql:/docker-entrypoint-initdb.d/port_drayage.sql
      - /etc/localtime:/etc/localtime:ro 
      - /etc/timezone:/etc/timezone:ro 
      # The following 5 files are used for CDA1Tenth. By default the standard "port_drayage.sql" file
      # will be loaded. Comment out the "port_drayage.sql" file above and uncomment the following 
      # three files to enable the CDA1Tenth sql files to be loaded.
      #- ./mysql/garage_port_drayage/port_drayage.sql:/docker-entrypoint-initdb.d/port_drayage.sql
      #- ./mysql/garage_port_drayage/port_drayage_lane1.sql:/docker-entrypoint-initdb.d/port_drayage_lane1.sql
      #- ./mysql/garage_port_drayage/port_drayage_lane2.sql:/docker-entrypoint-initdb.d/port_drayage_lane2.sql
      #- ./mysql/garage_port_drayage/port_drayage_trb_short.sql:/docker-entrypoint-initdb.d/port_drayage_trb_short.sql
      #- ./mysql/garage_port_drayage/port_drayage_trb_long.sql:/docker-entrypoint-initdb.d/port_drayage_trb_long.sql
      - mysql-datavolume:/var/lib/mysql
    # No ports exposed - database is only accessible internally

  php:
    image: usdotfhwaops/php:${V2XHUB_VERSION:-develop}
    container_name: php
    networks:
      - v2xhub_internal  # For database access
      - v2xhub_external  # For web UI access
    ports:
      - "${WEB_HTTP_PORT:-80}:80"    # HTTP (redirects to HTTPS)
      - "${WEB_HTTPS_PORT:-443}:443" # HTTPS Web UI
    restart: always
    depends_on:
      - db
      - v2xhub
    stdin_open: true
    tty: true
    environment:
      - V2XHUB_WS_HOST=${V2XHUB_WS_HOST:-v2xhub}
      - V2XHUB_WS_PORT=${COMMAND_WS_PORT:-19760}
    volumes:
      - /etc/localtime:/etc/localtime:ro 
      - /etc/timezone:/etc/timezone:ro 
      - ssl-certs-volume:/etc/apache2/ssl:ro

  v2xhub:
    image: usdotfhwaops/v2xhub:${V2XHUB_VERSION:-develop}
    container_name: v2xhub
    networks:
      - v2xhub_internal  # For database access
      - v2xhub_external  # For V2X communication
    ports:
      - "${V2X_PORT:-8686}:8686"  # V2X Messages - always exposed
      - "${COMMAND_WS_PORT:-19760}:19760" # WebSocket for CommandPlugin/Admin UI
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 2560
        hard: 2560
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 1g
    environment:
      - MYSQL_HOST=${MYSQL_HOST:-db}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-IVP}
      - MYSQL_USER=${MYSQL_USER:-IVP}
      - MYSQL_PASSWORD=/run/secrets/mysql_password
      - SIMULATION_MODE=${SIMULATION_MODE:-false}
      - SIMULATION_IP=${SIMULATION_IP:-127.0.0.1}
      - SIMULATION_REGISTRATION_PORT=${SIMULATION_REGISTRATION_PORT:-6767}
      - LOCAL_IP=${V2XHUB_IP:-0.0.0.0}  # Listen on all interfaces within container
      - TIME_SYNC_TOPIC=time_sync
      - TIME_SYNC_PORT=${TIME_SYNC_PORT:-7575}
      - SIM_V2X_PORT=${SIM_V2X_PORT:-5757}
      - SIM_INTERACTION_PORT=${SIM_INTERACTION_PORT:-7576}
      - V2X_PORT=${V2X_PORT:-8686}
      - INFRASTRUCTURE_ID=${INFRASTRUCTURE_ID:-rsu_1234}
      - INFRASTRUCTURE_NAME=${INFRASTRUCTURE_NAME:-East Intersection}
      - SENSOR_JSON_FILE_PATH=${SENSOR_JSON_FILE_PATH:-/var/www/download/sensors.json}
      - V2XHUB_USERNAME=${V2XHUB_USERNAME:-v2xadmin}
      - V2XHUB_PASSWORD=${V2XHUB_PASSWORD}
      - COMMAND_WS_PORT=${COMMAND_WS_PORT:-19760}  # WebSocket port for CommandPlugin
    secrets:
      - mysql_password
    volumes:
      - v2xhub-logs-volume:/var/log/tmx:rw
      - v2xhub-download-volume:/var/www/download/:rw
      - /etc/localtime:/etc/localtime:ro 
      - /etc/timezone:/etc/timezone:ro 
      - ssl-certs-volume:/var/www/plugins/ssl:rw

  # V2X-Hub with simulation ports exposed - only when simulation profile is active
  v2xhub_with_simulation:
    image: usdotfhwaops/v2xhub:${V2XHUB_VERSION:-develop}
    container_name: v2xhub_with_simulation
    profiles: ["simulation"]
    networks:
      - v2xhub_internal  # For database access
      - v2xhub_external  # For V2X communication
    ports:
      - "${V2X_PORT:-8686}:8686"                      # V2X Messages - always exposed
      - "${COMMAND_WS_PORT:-19760}:19760"             # WebSocket for CommandPlugin/Admin UI
      - "${SIMULATION_REGISTRATION_PORT:-6767}:6767"  # Simulation Registration
      - "${TIME_SYNC_PORT:-7575}:7575"                # Time Sync
      - "${SIM_V2X_PORT:-5757}:5757"                  # Sim V2X Messages
      - "${SIM_INTERACTION_PORT:-7576}:7576"          # Sim Interaction
    restart: always
    depends_on:
      - db
    ulimits:
      nofile:
        soft: 2560
        hard: 2560
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 1g
    environment:
      - MYSQL_HOST=${MYSQL_HOST:-db}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-IVP}
      - MYSQL_USER=${MYSQL_USER:-IVP}
      - MYSQL_PASSWORD=/run/secrets/mysql_password
      - SIMULATION_MODE=true  # Force simulation mode when this service is used
      - SIMULATION_IP=${SIMULATION_IP:-127.0.0.1}
      - SIMULATION_REGISTRATION_PORT=${SIMULATION_REGISTRATION_PORT:-6767}
      - LOCAL_IP=${V2XHUB_IP:-0.0.0.0}  # Listen on all interfaces within container
      - TIME_SYNC_TOPIC=time_sync
      - TIME_SYNC_PORT=${TIME_SYNC_PORT:-7575}
      - SIM_V2X_PORT=${SIM_V2X_PORT:-5757}
      - SIM_INTERACTION_PORT=${SIM_INTERACTION_PORT:-7576}
      - V2X_PORT=${V2X_PORT:-8686}
      - INFRASTRUCTURE_ID=${INFRASTRUCTURE_ID:-rsu_1234}
      - INFRASTRUCTURE_NAME=${INFRASTRUCTURE_NAME:-East Intersection}
      - SENSOR_JSON_FILE_PATH=${SENSOR_JSON_FILE_PATH:-/var/www/download/sensors.json}
      - V2XHUB_USERNAME=${V2XHUB_USERNAME:-v2xadmin}
      - V2XHUB_PASSWORD=${V2XHUB_PASSWORD}
      - COMMAND_WS_PORT=${COMMAND_WS_PORT:-19760}  # WebSocket port for CommandPlugin
    secrets:
      - mysql_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "db", "-u", "IVP", "-p$$(cat /run/secrets/mysql_password)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - v2xhub-logs-volume:/var/log/tmx:rw
      - v2xhub-download-volume:/var/www/download/:rw
      - /etc/localtime:/etc/localtime:ro 
      - /etc/timezone:/etc/timezone:ro 
      - ssl-certs-volume:/var/www/plugins/ssl:rw

  port_drayage_webservice:
    image: usdotfhwaops/port-drayage-webservice:${V2XHUB_VERSION:-develop}
    container_name: port_drayage_webservice
    networks:
      - v2xhub_internal  # For database access
      - v2xhub_external  # For API access
    ports:
      - "${PORT_DRAYAGE_PORT:-8090}:8080"  # Spring Boot REST API
    profiles: ["port_drayage"]
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m
    volumes:
      - /etc/localtime:/etc/localtime:ro 
      - /etc/timezone:/etc/timezone:ro 

secrets:
    mysql_password:
        environment: MYSQL_PASSWORD

networks:
  v2xhub_internal:
    driver: bridge
    internal: true  # No external internet access - only inter-service communication
    ipam:
      config:
        - subnet: 172.20.0.0/16
  v2xhub_external:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  mysql-datavolume:
  ssl-certs-volume:
    # To access/set SSL certifications on host machine setup local mapping to ssl directory.
    # NOTE: Ensure directory exists and has non-root privileges before running 
    # docker compose to prevent permission issues
    # driver: local
    # driver_opts:
    #   type: 'none'
    #   o: 'bind'
    #   device: './ssl' # Specify the absolute path on your host
  v2xhub-download-volume:
    # To access V2X Hub uploaded files on host machine setup local mapping to download directory.
    # NOTE: Ensure directory exists and has non-root privileges before running 
    # docker compose to prevent permission issues
    # driver: local
    # driver_opts:
    #   type: 'none'
    #   o: 'bind'
    #   device: './download' # Specify the absolute path on your host
  v2xhub-logs-volume:
    # To access log files on host machine setup local mapping to logs directory.
    # NOTE: Ensure directory exists and has non-root privileges before running 
    # docker compose to prevent permission issues
    # driver: local
    # driver_opts:
    #   type: 'none'
    #   o: 'bind'
    #   device: './logs' # Specify the absolute path on your host
