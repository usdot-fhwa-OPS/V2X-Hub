name: v2xhub-validation
title: V2X-Hub Network and Security Validation
maintainer: V2X-Hub Team
copyright: USDOT FHWA OPS
copyright_email: support@v2xhub.org
license: Apache-2.0
summary: InSpec profile for validating V2X-Hub Docker deployment network configuration and security
version: 1.0.0
inspec_version: '>= 4.0'

supports:
  - platform-name: linux
  - platform-name: windows

depends: []

inputs:
  - name: mysql_host
    description: MySQL database host
    type: string
    value: db
    
  - name: mysql_port
    description: MySQL database port
    type: numeric
    value: 3306
    
  - name: mysql_database
    description: MySQL database name
    type: string
    value: IVP
    
  - name: mysql_user
    description: MySQL database user
    type: string
    value: IVP
    
  - name: websocket_port
    description: V2XHub WebSocket port
    type: numeric
    value: 19760
    
  - name: v2x_port
    description: V2X Messages port
    type: numeric
    value: 8686
    
  - name: web_http_port
    description: Web UI HTTP port
    type: numeric
    value: 80
    
  - name: web_https_port
    description: Web UI HTTPS port
    type: numeric
    value: 443
