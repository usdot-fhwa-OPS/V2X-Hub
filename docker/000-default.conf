<VirtualHost *:80>

  ServerAdmin admin@localhost
  DocumentRoot /var/www/html
  RewriteEngine On
  RewriteCond %{HTTPS} !=on
  RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=301,L]

</VirtualHost>

<VirtualHost *:443>

  SSLEngine on
  SSLCertificateFile /etc/apache2/ssl/cert.pem
  SSLCertificateKeyFile /etc/apache2/ssl/cert-key.pem

  ServerAdmin admin@localhost
  DocumentRoot /var/www/html
  ErrorLog ${APACHE_LOG_DIR}/error.log
  CustomLog ${APACHE_LOG_DIR}/access.log combined

  # WebSocket proxy configuration for V2X-Hub CommandPlugin
  ProxyRequests Off
  ProxyPreserveHost On

  # WebSocket proxy for V2X-Hub CommandPlugin
  # Environment variables V2XHUB_WS_HOST and V2XHUB_WS_PORT will be substituted at runtime
  ProxyPass /v2xhub-ws ws://${V2XHUB_WS_HOST}:${V2XHUB_WS_PORT}/
  ProxyPassReverse /v2xhub-ws ws://${V2XHUB_WS_HOST}:${V2XHUB_WS_PORT}/

  # Handle WebSocket upgrade headers
  RewriteEngine On
  RewriteCond %{HTTP:Upgrade} websocket [NC]
  RewriteCond %{HTTP:Connection} upgrade [NC]
  RewriteRule ^/v2xhub-ws/(.*) "ws://${V2XHUB_WS_HOST}:${V2XHUB_WS_PORT}/$1" [P,L]

</VirtualHost>
